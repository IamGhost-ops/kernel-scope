apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "pro-network-behavioral-2026"
spec:
  kprobes:
    - call: "tcp_v4_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"
        - index: 1
          type: "int"
    - call: "tcp_v6_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"
        - index: 1
          type: "int"
    - call: "tcp_close"
      syscall: false
      args:
        - index: 0
          type: "sock"
      selectors:
        - matchActions:
            - action: Post
