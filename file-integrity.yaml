apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "file-integrity"
spec:
  kprobes:
    - call: "fd_install"
      syscall: false
      args:
        - index: 0
          type: "int"
        - index: 1
          type: "file"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Prefix"
              values:
                - "/etc/shadow"
                - "/etc/sudoers"
                - "/etc/pacman.conf"
                - "/root/.ssh"
          matchActions:
            - action: Post  